<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <link rel="stylesheet" href="external/style.css">
</head>
<body>
    <header>
        <h1>Grid-Sizing</h1>
        <p>This is a simple grid layout example.</p>
        <a href="https://appbrewery.github.io/grid-sizing/">Grid Sizing Example</a>
    </header>
    <section>
        <h2>Grid sizing types</h2>
        <p>Below are different ways to size grid items:</p>
        <ul>
            <li>Fixed sizes</li>
            <li>auto sizes</li>
            <li> fractional sizes (fr)</li>
            <li> min/max sizes</li>
            <li>Repeat</li>
            <li>Test</li>
        </ul>
    </section>
    <section>
        <div class="grid-container">
            <div class="grid-item">1</div>
            <div class="grid-item">2</div>
            <div class="grid-item">3</div>
            <div class="grid-item">4</div>
            <div class="grid-item">5</div>
            <div class="grid-item">6</div>
        </div>
    </section>
</body>
</html>
